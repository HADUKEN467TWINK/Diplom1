<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Скачивание CVE файла</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                text-align: center;
                padding: 50px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .container {
                background: white;
                padding: 40px;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                max-width: 500px;
                width: 100%;
            }
            .icon {
                font-size: 60px;
                margin-bottom: 20px;
            }
            .spinner {
                border: 4px solid #f3f3f3;
                border-top: 4px solid #667eea;
                border-radius: 50%;
                width: 50px;
                height: 50px;
                animation: spin 1s linear infinite;
                margin: 20px auto;
            }
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            .btn {
                display: inline-block;
                padding: 12px 30px;
                background: #667eea;
                color: white;
                text-decoration: none;
                border-radius: 8px;
                margin-top: 20px;
                transition: all 0.3s;
                border: none;
                cursor: pointer;
                font-size: 16px;
            }
            .btn:hover {
                background: #764ba2;
                transform: scale(1.05);
            }
            .status {
                margin-top: 15px;
                padding: 10px;
                background: #f0f0f0;
                border-radius: 8px;
                font-size: 14px;
                color: #333;
            }
            .success {
                background: #d4edda !important;
                color: #155724 !important;
            }
            .error {
                background: #f8d7da !important;
                color: #721c24 !important;
            }
            .back-link {
                color: #667eea;
                text-decoration: none;
                cursor: pointer;
            }
            .back-link:hover {
                text-decoration: underline;
            }
        </style>
        <script>
            var downloadUrl = null;
            
            window.onload = function() {
                var urlElement = document.getElementById('downloadUrl');
                if (urlElement) {
                    downloadUrl = urlElement.getAttribute('data-url');
                }
                
                if (downloadUrl && downloadUrl !== '') {
                    setTimeout(function() {
                        // Скачиваем без открытия новой вкладки
                        var link = document.createElement('a');
                        link.href = downloadUrl;
                        link.download = ''; // Пустой download заставляет браузер скачать файл
                        link.style.display = 'none';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        
                        var statusEl = document.getElementById('status');
                        statusEl.innerHTML = '✅ Скачивание началось! Файл сохраняется в папку "Загрузки"';
                        statusEl.className = 'status success';
                    }, 1000);
                } else {
                    var statusEl = document.getElementById('status');
                    statusEl.innerHTML = '❌ Ошибка: URL не настроен. Проверьте конфигурацию.';
                    statusEl.className = 'status error';
                }
            };
            
            function downloadAgain() {
                if (downloadUrl && downloadUrl !== '') {
                    var link = document.createElement('a');
                    link.href = downloadUrl;
                    link.download = '';
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else {
                    alert('URL не настроен! Проверьте конфигурацию.');
                }
            }
            
            function goBack() {
                // Закрываем текущее окно/вкладку
                window.close();
                // Если не закрылось, пытаемся перейти на главную
                setTimeout(function() {
                    window.location.href = '/';
                }, 500);
            }
        </script>
    </head>
    <body>
        <div class="container">
            <div class="icon">📥</div>
            <h2>Скачивание CVE файла</h2>
            <div class="spinner"></div>
            <p>Идет подготовка к скачиванию...</p>
            <div id="status" class="status">⏳ Подготовка файла...</div>
            <br>
            <button onclick="downloadAgain()" class="btn">⬇️ Скачать еще раз</button>
            <br><br>
            <span onclick="goBack()" class="back-link">← Вернуться назад</span>
            <p style="margin-top: 20px; font-size: 12px; color: #999;">
                Если скачивание не началось автоматически, нажмите кнопку выше.
            </p>
            <!-- Скрытый элемент с URL -->
            <div id="downloadUrl" data-url="{update_url_cve}" style="display:none;"></div>
        </div>
    </body>
</html>

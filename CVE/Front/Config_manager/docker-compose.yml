name: "config-manager"

services:
  config-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: config-manager
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./:/app  # Для разработки
    environment:
      REDIS_HOST: my-redis
      REDIS_PORT: 6379
    networks:
      - redis-mini-storage-network

networks:
  redis-mini-storage-network:
    external: true